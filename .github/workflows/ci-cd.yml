name: CI/CD

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - master

permissions:
  contents: read
  pull-requests: read

env:
  APP_NAME: Epos API
  API_HOST: 0.0.0.0
  API_PORT: 8000
  SERVER_NAME: localhost
  POSTGRES_DB: epos_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  SECRET: ci-secret
  VERSION: ci
  DESCRIPTION: CI test environment
  DEBUG_MODE: "false"

jobs:
  detect-merged-pr:
    name: Detect merged PR
    runs-on: ubuntu-latest
    outputs:
      skip-tests: ${{ steps.detect.outputs.skip-tests }}

    steps:
      - name: Check associated pull request
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('skip-tests', 'false');
              return;
            }

            const { owner, repo } = context.repo;
            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const isMergedPrToMaster = response.data.some((pr) => {
              return pr.base.ref === 'master' && pr.merged_at;
            });

            core.setOutput('skip-tests', isMergedPrToMaster ? 'true' : 'false');

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs:
      - detect-merged-pr
    if: needs.detect-merged-pr.outputs.skip-tests != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: epos-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create CI environment file
        run: |
          {
            printf 'APP_NAME=%s\n' "${APP_NAME}"
            printf 'API_HOST=%s\n' "${API_HOST}"
            printf 'API_PORT=%s\n' "${API_PORT}"
            printf 'SERVER_NAME=%s\n' "${SERVER_NAME}"
            printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB}"
            printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER}"
            printf 'POSTGRES_PASSWORD=%s\n' "${POSTGRES_PASSWORD}"
            printf 'POSTGRES_HOST=%s\n' "${POSTGRES_HOST}"
            printf 'POSTGRES_PORT=%s\n' "${POSTGRES_PORT}"
            printf 'SECRET=%s\n' "${SECRET}"
            printf 'VERSION=%s\n' "${VERSION}"
            printf 'DESCRIPTION=%s\n' "${DESCRIPTION}"
            printf 'DEBUG_MODE=%s\n' "${DEBUG_MODE}"
          } > .env

      - name: Create CI compose override
        run: |
          {
            printf 'services:\n'
            printf '  api:\n'
            printf '    image: epos-api:%s\n' "${GITHUB_SHA}"
            printf '    build: null\n'
          } > docker-compose.ci.yml

      - name: Start Docker Compose services
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --no-build db api

      - name: Run database migrations
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T api alembic upgrade head

      - name: Run tests
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T api pytest tests/

      - name: Stop Docker Compose services
        if: ${{ !cancelled() }}
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --volumes --remove-orphans

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs:
      - detect-merged-pr
      - tests
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.detect-merged-pr.result == 'success' &&
      (success() || needs.tests.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: epos-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
